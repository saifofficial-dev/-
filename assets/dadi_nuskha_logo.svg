<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Gold/Mustard Metallic Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4D068" />
      <stop offset="50%" stop-color="#D4A017" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    
    <!-- Deep Wood Gradient -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D4C41" />
      <stop offset="50%" stop-color="#4E342E" />
      <stop offset="100%" stop-color="#3E2723" />
    </linearGradient>

    <!-- Oil Golden Glow -->
    <linearGradient id="oilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEE58" />
      <stop offset="100%" stop-color="#F57F17" />
    </linearGradient>

    <!-- Warm Banner Gradient -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFDF6" />
      <stop offset="50%" stop-color="#FFF9E6" />
      <stop offset="100%" stop-color="#FFFDF6" />
    </linearGradient>

    <!-- Drop Shadow Filter for realism -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#3E2723" flood-opacity="0.15" />
    </filter>
    <filter id="insetShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="0" dy="3"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.6" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Solid Outer Black background wrapper optional but we design it as a transparent/cream outer badge to fit both -->
  <g filter="url(#shadow)">
    <!-- Pointed Mughal Arch Shield Outer Background (Dark Brown) -->
    <path d="M 250,15 C 280,30 320,45 360,65 C 440,105 480,180 480,260 C 480,340 440,415 360,455 C 320,475 280,490 250,505 C 220,490 180,475 140,455 C 60,415 20,340 20,260 C 20,180 60,105 140,65 C 180,45 220,30 250,15 Z" fill="#3E2723" />
    
    <!-- Outer Gold Border -->
    <path d="M 250,22 C 278,36 317,50 356,70 C 433,109 471,181 471,260 C 471,339 433,411 356,450 C 317,470 278,484 250,498 C 222,484 183,470 144,450 C 67,411 29,339 29,260 C 29,181 67,109 144,70 C 183,50 222,36 250,22 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" />
    
    <!-- Concentric Inner Gold Frame -->
    <path d="M 250,30 C 276,43 313,56 350,75 C 423,111 460,181 460,260 C 460,339 423,409 350,445 C 313,464 276,477 250,490 C 224,477 187,464 150,445 C 77,409 40,339 40,260 C 40,181 77,111 150,75 C 187,56 224,43 250,30 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="3,5" />

    <!-- Inner Shield (Cream/Parchment Color) -->
    <path d="M 250,36 C 274,48 310,61 345,79 C 415,114 450,181 450,260 C 450,339 415,406 345,441 C 310,459 274,472 250,484 C 226,472 190,459 155,441 C 85,406 50,339 50,260 C 50,181 85,114 155,79 C 190,61 226,48 250,36 Z" fill="#FFFDF5" />
    
    <!-- Concentric Inner Golden Line Border on Cream Area -->
    <path d="M 250,46 C 271,57 304,69 337,85 C 403,118 436,181 436,260 C 436,339 403,402 337,435 C 304,451 271,463 250,474 C 229,463 196,451 163,435 C 97,402 64,339 64,260 C 64,181 97,118 163,85 C 196,69 229,57 250,46 Z" fill="none" stroke="#D4A017" stroke-width="1.5" />

    <!-- Delicate Dot Border on Cream Area -->
    <path d="M 250,54 C 269,64 300,75 330,90 C 392,121 423,181 423,260 C 423,339 392,399 330,430 C 300,445 269,456 250,466 C 231,456 200,445 170,430 C 108,399 77,339 77,260 C 77,181 108,121 170,90 C 200,75 231,64 250,54 Z" fill="none" stroke="#D4A017" stroke-width="1.5" stroke-dasharray="1,4" stroke-linecap="round" />

    <!-- TOP FLORAL ORNAMENT (Mughal-style flower) -->
    <g transform="translate(250, 75) scale(0.8)">
      <!-- Petals -->
      <circle cx="0" cy="0" r="8" fill="url(#goldGrad)" />
      <circle cx="0" cy="-15" r="7" fill="url(#goldGrad)" />
      <circle cx="13" cy="-8" r="7" fill="url(#goldGrad)" />
      <circle cx="13" cy="8" r="7" fill="url(#goldGrad)" />
      <circle cx="0" cy="15" r="7" fill="url(#goldGrad)" />
      <circle cx="-13" cy="8" r="7" fill="url(#goldGrad)" />
      <circle cx="-13" cy="-8" r="7" fill="url(#goldGrad)" />
      <!-- Floral scrolls left and right -->
      <path d="M -15,-5 C -35,-15 -55,0 -75,-10" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
      <path d="M 15,-5 C 35,-15 55,0 75,-10" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
      <!-- Little leaves -->
      <path d="M -35,-10 Q -40,-20 -30,-15 Z" fill="url(#goldGrad)" />
      <path d="M -55,-5 Q -60,-15 -50,-10 Z" fill="url(#goldGrad)" />
      <path d="M 35,-10 Q 40,-20 30,-15 Z" fill="url(#goldGrad)" />
      <path d="M 55,-5 Q 60,-15 50,-10 Z" fill="url(#goldGrad)" />
    </g>

    <!-- ==========================================
         URDU CALLIGRAPHY: "دادی کا نسخہ"
         ========================================== -->
    <g transform="translate(250, 155)">
      <!-- Drop Shadow for typography -->
      <text x="0" y="0" font-family="'Noto Nastaliq Urdu', 'Playfair Display', serif" font-weight="900" font-size="34px" fill="#3E2723" text-anchor="middle" letter-spacing="-0.5px">دادی کا نسخہ</text>
      <!-- Subtitle flourish -->
      <path d="M -110,20 Q -40,30 0,20 T 110,20" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
      <circle cx="0" cy="23" r="3.5" fill="#3E2723" />
      <!-- Small leafy flourish below text -->
      <path d="M -25,23 C -10,33 0,23 15,30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
      <path d="M 25,23 C 10,33 0,23 -15,30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
    </g>

    <!-- ==========================================
         CENTER PIECE: THE TRADITIONAL WOODEN KOHLU
         ========================================== -->
    <g transform="translate(250, 275)">
      <!-- Main wooden mortar (tub) base -->
      <path d="M -50,15 L 50,15 L 42,60 C 40,65 30,68 0,68 C -30,68 -40,65 -42,60 Z" fill="url(#woodGrad)" stroke="#2D1A17" stroke-width="2" />
      
      <!-- Mortar Top Ring (Lip) -->
      <ellipse cx="0" cy="15" rx="50" ry="12" fill="#5D4037" stroke="#2D1A17" stroke-width="2" />
      <ellipse cx="0" cy="15" rx="42" ry="9" fill="#3E2723" />

      <!-- Wooden pestle (Kohlu center wood bar) -->
      <!-- Vertical heavy pestle tilted slightly to the right -->
      <path d="M -6,-35 L 12,-30 L 5,20 L -12,15 Z" fill="url(#woodGrad)" opacity="0.95" stroke="#2D1A17" stroke-width="1.5" />
      <ellipse cx="3" cy="-32" rx="9" ry="3" fill="#8D6E63" stroke="#2D1A17" stroke-width="1" />

      <!-- Horizontal rotation bar/mechanism -->
      <path d="M -4,-15 L 60,-5 L 58,5 L -6,-5 Z" fill="url(#woodGrad)" stroke="#2D1A17" stroke-width="1.5" />

      <!-- Golden oil dripping from mortar spout -->
      <!-- Spout -->
      <path d="M 35,35 L 52,42 L 50,47 L 32,40 Z" fill="url(#woodGrad)" stroke="#2D1A17" stroke-width="1" />
      <!-- Golden Oil Stream -->
      <path d="M 46,42 Q 49,58 48,68 Q 48,72 45,74" fill="none" stroke="url(#oilGrad)" stroke-width="4" stroke-linecap="round" />
      <!-- Golden droplet hanging -->
      <circle cx="45" cy="76" r="3.5" fill="url(#oilGrad)" />

      <!-- Small Brass Bowl catching the oil -->
      <path d="M 30,72 Q 45,72 60,72 L 55,88 C 50,92 40,92 35,88 Z" fill="url(#goldGrad)" stroke="#AA7C11" stroke-width="1.5" />
      <ellipse cx="45" cy="72" rx="15" ry="3" fill="#AA7C11" />
      <!-- Oil level inside bowl -->
      <ellipse cx="45" cy="73" rx="12" ry="2.5" fill="url(#oilGrad)" />

      <!-- Mustard Seeds scattered on the ground (left side of base) -->
      <g transform="translate(-75, 58)" fill="#E5A910">
        <circle cx="0" cy="0" r="2" />
        <circle cx="4" cy="-2" r="2" />
        <circle cx="-3" cy="2" r="1.5" />
        <circle cx="6" cy="3" r="2" />
        <circle cx="1" cy="5" r="1.8" />
        <circle cx="-5" cy="-3" r="2" />
        <circle cx="10" cy="1" r="1.5" />
        <circle cx="-9" cy="4" r="2" />
        <circle cx="14" cy="5" r="1.7" />
        <circle cx="-12" cy="1" r="1.5" />
        <circle cx="18" cy="2" r="2" />
        <circle cx="22" cy="5" r="1.8" />
        <circle cx="-16" cy="6" r="2" />
        <circle cx="28" cy="3" r="1.5" />
      </g>
    </g>

    <!-- ==========================================
         LEFT ASSET: MUSTARD FLOWERS (Sarson ke Phool)
         ========================================== -->
    <g transform="translate(145, 275)">
      <!-- Main Stem -->
      <path d="M 20,60 C 15,20 5,-10 -5,-35" fill="none" stroke="#2E4032" stroke-width="3" stroke-linecap="round" />
      <!-- Side branches and leaves -->
      <path d="M 12,30 C 0,25 -8,15 -12,5" fill="none" stroke="#2E4032" stroke-width="2" />
      <!-- Large green leaf -->
      <path d="M 14,35 Q -10,32 -2,15 Q 12,20 14,35" fill="#2E4032" stroke="#1E2B21" stroke-width="1" />
      <path d="M 8,24 Q 25,10 18,2" fill="none" stroke="#2E4032" stroke-width="1.5" />
      <path d="M 11,20 Q 28,15 22,25 Z" fill="#2E4032" />
      
      <!-- Cluster of Yellow Mustard Flowers (Sarson) -->
      <!-- Flower 1 (Top) -->
      <g transform="translate(-5, -35)">
        <circle cx="0" cy="0" r="3.5" fill="#5D4037" /> <!-- Center -->
        <circle cx="0" cy="-7" r="5" fill="#FBC02D" />
        <circle cx="7" cy="0" r="5" fill="#FBC02D" />
        <circle cx="0" cy="7" r="5" fill="#FBC02D" />
        <circle cx="-7" cy="0" r="5" fill="#FBC02D" />
        <circle cx="0" cy="0" r="2" fill="#FFF59D" />
      </g>
      <!-- Flower 2 (Right) -->
      <g transform="translate(12, -22) scale(0.85)">
        <circle cx="0" cy="0" r="3.5" fill="#5D4037" />
        <circle cx="0" cy="-7" r="5" fill="#FBC02D" />
        <circle cx="7" cy="0" r="5" fill="#FBC02D" />
        <circle cx="0" cy="7" r="5" fill="#FBC02D" />
        <circle cx="-7" cy="0" r="5" fill="#FBC02D" />
        <circle cx="0" cy="0" r="2" fill="#FFF59D" />
      </g>
      <!-- Flower 3 (Left) -->
      <g transform="translate(-20, -18) scale(0.85)">
        <circle cx="0" cy="0" r="3.5" fill="#5D4037" />
        <circle cx="0" cy="-7" r="5" fill="#FBC02D" />
        <circle cx="7" cy="0" r="5" fill="#FBC02D" />
        <circle cx="0" cy="7" r="5" fill="#FBC02D" />
        <circle cx="-7" cy="0" r="5" fill="#FBC02D" />
        <circle cx="0" cy="0" r="2" fill="#FFF59D" />
      </g>
      <!-- Unopened Buds (Topmost tip) -->
      <circle cx="-8" cy="-48" r="3.5" fill="#9E9D24" />
      <circle cx="-3" cy="-45" r="3" fill="#9E9D24" />
      <circle cx="-11" cy="-42" r="2.5" fill="#9E9D24" />
    </g>

    <!-- ==========================================
         RIGHT ASSET: GLOWING DIYA (Oil Lamp)
         ========================================== -->
    <g transform="translate(335, 290)">
      <!-- Brass Diya Stand/Body -->
      <path d="M -15,25 Q 0,25 15,25 L 18,35 C 18,48 10,50 0,50 C -10,50 -18,48 -18,35 Z" fill="url(#goldGrad)" stroke="#AA7C11" stroke-width="1.5" />
      <!-- Rim of Diya -->
      <ellipse cx="0" cy="25" rx="16" ry="4" fill="#AA7C11" stroke="#8C6208" stroke-width="1" />
      <!-- Inner reservoir with oil -->
      <ellipse cx="0" cy="26" rx="12" ry="2.5" fill="#F57F17" />
      
      <!-- Glowing Flame (Spiritual, traditional touch) -->
      <!-- Outer Flame Glow -->
      <path d="M 0,23 C -8,12 -8,0 0,-15 C 8,0 8,12 0,23 Z" fill="#FF3D00" opacity="0.25" />
      <!-- Mid Flame -->
      <path d="M 0,23 C -6,14 -6,4 0,-10 C 6,4 6,14 0,23 Z" fill="#FF9100" opacity="0.7" />
      <!-- Inner Bright Flame Core -->
      <path d="M 0,23 C -3,17 -3,8 0,-4 C 3,8 3,17 0,23 Z" fill="#FFFF00" />
      <!-- Tiny Wick -->
      <line x1="0" y1="26" x2="0" y2="18" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <!-- ==========================================
         BOTTOM RIBBON & URDU SUBTEXT
         ========================================== -->
    <g transform="translate(250, 410)">
      <!-- Ribbon Shadow/Backing folds -->
      <path d="M -150,15 L -130,2 L -130,28 Z" fill="#AA7C11" />
      <path d="M 150,15 L 130,2 L 130,28 Z" fill="#AA7C11" />
      
      <!-- Ribbon Swallowtails left and right -->
      <path d="M -130,2 L -165,12 L -130,25 Z" fill="#BCAAA4" stroke="#5D4037" stroke-width="1.5" />
      <path d="M 130,2 L 165,12 L 130,25 Z" fill="#BCAAA4" stroke="#5D4037" stroke-width="1.5" />

      <!-- Main Banner Body (Curved cream parchment) -->
      <path d="M -135,-3 C -50,10 50,10 135,-3 L 130,22 C 50,35 -50,35 -130,22 Z" fill="url(#bannerGrad)" stroke="#3E2723" stroke-width="2" />
      
      <!-- Fine gold highlight line inside ribbon -->
      <path d="M -128,1 C -50,13 50,13 128,1" fill="none" stroke="url(#goldGrad)" stroke-width="1" />
      <path d="M -124,19 C -50,31 50,31 124,19" fill="none" stroke="url(#goldGrad)" stroke-width="1" />

      <!-- Banner Text: "وہی خالص پن، وہی پرانا اعتماد" (The same purity, the same old trust) -->
      <!-- Since it is curved, we can use simple arched styling or horizontal centered text adjusted beautifully -->
      <text x="0" y="14" font-family="'Noto Nastaliq Urdu', 'Playfair Display', serif" font-weight="bold" font-size="12.5px" fill="#3E2723" text-anchor="middle" letter-spacing="0.2px">وہی خالص پن ، وہی پرانا اعتماد</text>
    </g>

    <!-- Decorative floral curls under the ribbon -->
    <g transform="translate(250, 442) scale(0.8)">
      <path d="M -40,10 Q -20,25 0,10 Q 20,25 40,10" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
      <circle cx="0" cy="18" r="3" fill="url(#goldGrad)" />
      <circle cx="-15" cy="16" r="2" fill="url(#goldGrad)" />
      <circle cx="15" cy="16" r="2" fill="url(#goldGrad)" />
    </g>
  </g>
</svg>
